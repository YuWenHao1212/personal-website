<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif">
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="#fff"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#333">自建開源模型（地端部署）資料處理流程</text>

  <!-- Left zone: Your computer -->
  <rect x="30" y="55" width="340" height="340" rx="12" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1.5"/>
  <text x="50" y="78" font-size="13" font-weight="bold" fill="#2e7d32">你的電腦（安全區）</text>

  <!-- Step 1 -->
  <rect x="60" y="95" width="260" height="50" rx="8" fill="#fff" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="190" y="117" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">1. 使用者操作 AI 工具</text>
  <text x="190" y="135" text-anchor="middle" font-size="11" fill="#666">（自建介面）</text>

  <!-- Arrow 1->2 -->
  <line x1="190" y1="145" x2="190" y2="165" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2 -->
  <rect x="60" y="165" width="260" height="50" rx="8" fill="#fff" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="190" y="187" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">2. 輸入資料</text>
  <text x="190" y="205" text-anchor="middle" font-size="11" fill="#666">（文件、問題、表單等）</text>

  <!-- Arrow 2->7 (return) -->
  <line x1="190" y1="315" x2="190" y2="335" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 7 -->
  <rect x="60" y="335" width="260" height="50" rx="8" fill="#fff" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="190" y="357" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">7. 結果回到你的電腦</text>
  <text x="190" y="375" text-anchor="middle" font-size="11" fill="#666">在本機確認使用</text>

  <!-- Right zone: YOUR server room -->
  <rect x="470" y="55" width="400" height="340" rx="12" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1.5"/>
  <text x="490" y="78" font-size="13" font-weight="bold" fill="#2e7d32">你自己的機房 / GPU 伺服器</text>

  <!-- Step 4 -->
  <rect x="510" y="95" width="320" height="50" rx="8" fill="#fff" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="670" y="117" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">4. 安全檢查</text>
  <text x="670" y="135" text-anchor="middle" font-size="11" fill="#666">（自行設定，自行維護）</text>

  <!-- Arrow 4->5 -->
  <line x1="670" y1="145" x2="670" y2="175" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 5 -->
  <rect x="510" y="175" width="320" height="55" rx="8" fill="#fff" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="670" y="197" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">5. 開源模型推論</text>
  <text x="670" y="217" text-anchor="middle" font-size="11" fill="#666">Llama / gpt-oss 等，跑在你的 GPU 上</text>

  <!-- Note: key difference -->
  <text x="510" y="250" font-size="11" fill="#2e7d32" font-weight="bold">資料 100% 在你自己的設備上，不經過任何第三方</text>

  <!-- Note box -->
  <rect x="510" y="265" width="320" height="70" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
  <text x="525" y="286" font-size="11.5" fill="#e65100" font-weight="bold">※ 你需要自己負責：</text>
  <text x="535" y="305" font-size="11.5" fill="#bf360c">GPU 硬體採購與維護（H100 等）</text>
  <text x="535" y="324" font-size="11.5" fill="#bf360c">模型部署、更新、安全檢查、前端介面</text>

  <!-- Arrow 2->4: internal network -->
  <line x1="320" y1="190" x2="510" y2="120" stroke="#2e7d32" stroke-width="2.5" stroke-dasharray="8,4" marker-end="url(#arrow)"/>
  <rect x="348" y="128" width="170" height="38" rx="4" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1.2"/>
  <text x="433" y="147" text-anchor="middle" font-size="13" fill="#2e7d32" font-weight="bold">3. 內網傳輸</text>
  <text x="433" y="162" text-anchor="middle" font-size="10" fill="#388e3c">資料不離開你的網路</text>

  <!-- Arrow 5->7: internal return -->
  <line x1="510" y1="225" x2="320" y2="345" stroke="#2e7d32" stroke-width="2.5" stroke-dasharray="8,4" marker-end="url(#arrow)"/>
  <rect x="338" y="272" width="170" height="26" rx="4" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1.2"/>
  <text x="423" y="290" text-anchor="middle" font-size="13" fill="#2e7d32" font-weight="bold">6. 內網回傳結果</text>

  <!-- Bottom banner -->
  <rect x="80" y="425" width="740" height="40" rx="8" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1"/>
  <text x="450" y="450" text-anchor="middle" font-size="14" font-weight="bold" fill="#424242">資料完全不離開你的設備。但模型能力、維護成本、前端介面都要自己扛。</text>

  <!-- Legend -->
  <rect x="150" y="485" width="16" height="16" rx="3" fill="#e8f5e9" stroke="#a5d6a7"/>
  <text x="172" y="498" font-size="12" fill="#666">全部在你的設備上</text>
  <rect x="400" y="485" width="16" height="16" rx="3" fill="#fff3e0" stroke="#ff9800"/>
  <text x="422" y="498" font-size="12" fill="#666">備註</text>
</svg>
