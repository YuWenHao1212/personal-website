<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Inter', 'Helvetica Neue', sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#555"/>
    </marker>
  </defs>
  <rect width="900" height="520" fill="#fff"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#333">Managed Cloud (Bedrock / Azure OpenAI) Data Flow</text>
  <rect x="30" y="55" width="340" height="340" rx="12" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1.5"/>
  <text x="50" y="78" font-size="13" font-weight="bold" fill="#2e7d32">Your Computer (Safe Zone)</text>
  <rect x="60" y="95" width="260" height="50" rx="8" fill="#fff" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="190" y="117" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">1. User Opens AI Tool</text>
  <text x="190" y="135" text-anchor="middle" font-size="11" fill="#666">(Claude Code, custom UI, API calls, etc.)</text>
  <line x1="190" y1="145" x2="190" y2="165" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="60" y="165" width="260" height="50" rx="8" fill="#fff" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="190" y="187" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">2. Input Data</text>
  <text x="190" y="205" text-anchor="middle" font-size="11" fill="#666">(documents, questions, forms, etc.)</text>
  <line x1="190" y1="315" x2="190" y2="335" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="60" y="335" width="260" height="50" rx="8" fill="#fff" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="190" y="357" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">7. Results Return to You</text>
  <text x="190" y="375" text-anchor="middle" font-size="11" fill="#666">Review and use locally</text>
  <rect x="470" y="55" width="400" height="340" rx="12" fill="#e3f2fd" stroke="#90caf9" stroke-width="1.5"/>
  <text x="490" y="78" font-size="13" font-weight="bold" fill="#1565c0">Your AWS / GCP / Azure Account</text>
  <rect x="510" y="95" width="320" height="50" rx="8" fill="#fff" stroke="#64b5f6" stroke-width="1.5"/>
  <text x="670" y="117" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">4. Automated Safety Check</text>
  <text x="670" y="135" text-anchor="middle" font-size="11" fill="#666">(automated scan, no human review)</text>
  <line x1="670" y1="145" x2="670" y2="175" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="510" y="175" width="320" height="55" rx="8" fill="#fff" stroke="#64b5f6" stroke-width="1.5"/>
  <text x="670" y="197" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">5. Model Inference</text>
  <text x="670" y="217" text-anchor="middle" font-size="11" fill="#666">Read data → Generate response</text>
  <text x="510" y="250" font-size="11" fill="#1565c0" font-weight="bold">Data stays in your cloud account. AI company can't see it.</text>
  <rect x="510" y="265" width="320" height="70" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
  <text x="525" y="286" font-size="11.5" fill="#e65100" font-weight="bold">※ Anthropic / OpenAI cannot access your account</text>
  <text x="535" y="305" font-size="11.5" fill="#bf360c">Model provided by AI company, GPU managed by cloud</text>
  <text x="535" y="324" font-size="11.5" fill="#bf360c">You only call via your own account, never through AI co.</text>
  <line x1="320" y1="190" x2="510" y2="120" stroke="#616161" stroke-width="2.5" stroke-dasharray="8,4" marker-end="url(#arrow)"/>
  <rect x="348" y="128" width="170" height="38" rx="4" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1.2"/>
  <text x="433" y="147" text-anchor="middle" font-size="13" fill="#424242" font-weight="bold">3. TLS Encryption</text>
  <text x="433" y="162" text-anchor="middle" font-size="10" fill="#616161">To your own cloud account</text>
  <line x1="510" y1="225" x2="320" y2="345" stroke="#616161" stroke-width="2.5" stroke-dasharray="8,4" marker-end="url(#arrow)"/>
  <rect x="338" y="272" width="170" height="26" rx="4" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1.2"/>
  <text x="423" y="290" text-anchor="middle" font-size="13" fill="#424242" font-weight="bold">6. Encrypted Response</text>
  <rect x="80" y="425" width="740" height="40" rx="8" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1"/>
  <text x="450" y="450" text-anchor="middle" font-size="14" font-weight="bold" fill="#424242">Data stays in your cloud account end-to-end. AI company provides the model but can't see your data.</text>
  <rect x="80" y="485" width="16" height="16" rx="3" fill="#e8f5e9" stroke="#a5d6a7"/>
  <text x="102" y="498" font-size="12" fill="#666">Safe Zone (Local)</text>
  <rect x="250" y="485" width="16" height="16" rx="3" fill="#e3f2fd" stroke="#90caf9"/>
  <text x="272" y="498" font-size="12" fill="#666">Your Cloud Account</text>
  <rect x="430" y="485" width="16" height="16" rx="3" fill="#f5f5f5" stroke="#9e9e9e"/>
  <text x="452" y="498" font-size="12" fill="#666">Encrypted Channel</text>
  <rect x="580" y="485" width="16" height="16" rx="3" fill="#fff3e0" stroke="#ff9800"/>
  <text x="602" y="498" font-size="12" fill="#666">Notes</text>
</svg>
